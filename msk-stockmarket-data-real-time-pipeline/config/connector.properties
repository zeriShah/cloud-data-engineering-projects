# MSK Connect — Confluent S3 Sink Connector configuration
# Paste this block (without the # comments) into the MSK Connect console
# connector configuration text box.
# Replace s3.region and s3.bucket.name if you changed those resource names.

connector.class=io.confluent.connect.s3.S3SinkConnector
tasks.max=1
topics=stock-market-data
s3.region=us-east-1
s3.bucket.name=kafka-msk-snowflake-bucket
s3.part.size=5242880
topics.dir=topics
flush.size=100
storage.class=io.confluent.connect.s3.storage.S3Storage
format.class=io.confluent.connect.s3.format.json.JsonFormat
schema.compatibility=NONE
value.converter=org.apache.kafka.connect.json.JsonConverter
value.converter.schemas.enable=false
key.converter=org.apache.kafka.connect.storage.StringConverter
key.converter.schemas.enable=false
locale=en_US
timezone=UTC
timestamp.extractor=WallClock
rotate.interval.ms=60000
rotate.schedule.interval.ms=60000
errors.retry.timeout=-1
errors.retry.delay.max.ms=60000
errors.tolerance=all
errors.log.enable=true
errors.log.include.messages=true
